<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Auberge de Grandeur</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .profile-hero {
      background: linear-gradient(135deg, var(--brown-dark), var(--brown-rich));
      border-radius: var(--radius-md);
      padding: 40px;
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-dark);
    }
    .profile-avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      background: var(--brown-warm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 2.2rem;
      color: white;
      overflow: hidden;
      cursor: pointer;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-change-btn {
      position: absolute;
      bottom: 0; right: 0;
      width: 28px; height: 28px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--brown-dark);
      border: 2px solid white;
      font-weight: 700;
    }
    .profile-info-hero { color: white; }
    .profile-name-hero {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 300;
      color: var(--gold-light);
      margin-bottom: 4px;
    }
    .profile-username {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: rgba(245,230,200,0.45);
      text-transform: uppercase;
    }

    .profile-form-card {
      background: white;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(91,51,23,0.06);
      margin-bottom: 24px;
    }
    .profile-form-header {
      padding: 18px 28px;
      border-bottom: 1px solid #f0e8e0;
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--brown-dark);
    }
    .profile-form-body { padding: 28px; }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .readonly-field {
      padding: 12px 16px;
      background: var(--off-white);
      border: 1.5px solid #e8ddd4;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    #avatar-input { display: none; }
  </style>
</head>
<body>
<div class="layout">
  <div id="sidebar-slot"></div>
  <div class="main-content">
    <div id="topbar-slot"></div>
    <div class="page-content">

      <!-- Profile Hero -->
      <div class="profile-hero">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profile-avatar" onclick="document.getElementById('avatar-input').click()"></div>
          <div class="avatar-change-btn" onclick="document.getElementById('avatar-input').click()">+</div>
          <input type="file" id="avatar-input" accept="image/*" onchange="handleAvatarChange(event)" />
        </div>
        <div class="profile-info-hero">
          <div class="profile-name-hero" id="hero-name"></div>
          <div class="profile-username" id="hero-username"></div>
          <div style="margin-top:12px;font-size:0.78rem;color:rgba(245,230,200,0.4)">Click on avatar to change profile picture</div>
        </div>
      </div>

      <!-- Profile Info Form -->
      <div class="profile-form-card">
        <div class="profile-form-header">Personal Information</div>
        <div class="profile-form-body">
          <div class="form-grid-2">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" class="form-control" id="edit-firstname" />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" class="form-control" id="edit-lastname" />
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" id="edit-email" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" class="form-control" id="edit-phone" />
          </div>
          <div class="form-group">
            <label>Username</label>
            <div class="readonly-field" id="view-username"></div>
          </div>
          <div style="margin-top:8px">
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
          </div>
        </div>
      </div>

      <!-- Account Stats -->
      <div class="profile-form-card">
        <div class="profile-form-header">Account Summary</div>
        <div class="profile-form-body">
          <div class="stats-grid" id="profile-stats"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/nav.js"></script>
<script>
  const user = initPage('profile', 'My Profile');

  function loadProfile() {
    document.getElementById('hero-name').textContent = `${user.firstName} ${user.lastName}`;
    document.getElementById('hero-username').textContent = `@${user.username}`;
    document.getElementById('edit-firstname').value = user.firstName;
    document.getElementById('edit-lastname').value  = user.lastName;
    document.getElementById('edit-email').value     = user.email;
    document.getElementById('edit-phone').value     = user.contactNumber;
    document.getElementById('view-username').textContent = user.username;

    const avatarEl = document.getElementById('profile-avatar');
    if (user.profileImage) {
      avatarEl.innerHTML = `<img src="${user.profileImage}" alt="Profile" />`;
    } else {
      avatarEl.textContent = (user.firstName?.[0] || '') + (user.lastName?.[0] || '');
    }

    // Stats
    const reservations = Bookings.getForUser(user.username);
    const services = Services.getForUser(user.username);
    const totalSpent = reservations.reduce((s,r)=>s+r.totalRoomCost,0) + services.reduce((s,sv)=>s+sv.cost,0);

    document.getElementById('profile-stats').innerHTML = `
      <div class="stat-card">
        <div class="stat-number">${reservations.length}</div>
        <div class="stat-label">Total Reservations</div>
      </div>
      <div class="stat-card" style="border-left-color:var(--brown-light)">
        <div class="stat-number">${services.length}</div>
        <div class="stat-label">Service Requests</div>
      </div>
      <div class="stat-card" style="border-left-color:var(--gold)">
        <div class="stat-number">${UI.formatCurrency(totalSpent)}</div>
        <div class="stat-label">Total Spent</div>
      </div>
    `;
  }

  function saveProfile() {
    const fn = document.getElementById('edit-firstname').value.trim();
    const ln = document.getElementById('edit-lastname').value.trim();
    const em = document.getElementById('edit-email').value.trim();
    const ph = document.getElementById('edit-phone').value.trim();

    if (!fn || !ln || !em || !ph) { UI.showToast('Please fill in all fields.', 'error'); return; }
    if (!em.includes('@')) { UI.showToast('Please enter a valid email.', 'error'); return; }

    // Update in storage
    const users = Store.getUsers();
    const idx = users.findIndex(u => u.username === user.username);
    if (idx !== -1) {
      users[idx].firstName     = fn;
      users[idx].lastName      = ln;
      users[idx].email         = em;
      users[idx].contactNumber = ph;
      Store.saveUsers(users);
      Store.setCurrentUser(users[idx]);
      Object.assign(user, users[idx]);
    }

    UI.showToast('Profile updated successfully!', 'success');
    loadProfile();

    // Update topbar avatar/name
    const topbarAv = document.getElementById('topbar-avatar');
    if (topbarAv) UI.renderAvatar(user, topbarAv);
  }

  function handleAvatarChange(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result;
      const users = Store.getUsers();
      const idx = users.findIndex(u => u.username === user.username);
      if (idx !== -1) {
        users[idx].profileImage = base64;
        Store.saveUsers(users);
        Store.setCurrentUser(users[idx]);
        Object.assign(user, users[idx]);
      }
      const avatarEl = document.getElementById('profile-avatar');
      avatarEl.innerHTML = `<img src="${base64}" alt="Profile" />`;
      const topbarAv = document.getElementById('topbar-avatar');
      if (topbarAv) UI.renderAvatar(user, topbarAv);
      UI.showToast('Profile picture updated!', 'success');
    };
    reader.readAsDataURL(file);
  }

  loadProfile();
</script>
</body>
</html>
