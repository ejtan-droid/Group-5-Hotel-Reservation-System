<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservation — Auberge de Grandeur</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .section-card{background:white;border-radius:var(--radius-md);box-shadow:0 2px 12px rgba(91,51,23,0.06);margin-bottom:28px;overflow:hidden;}
    .section-card-header{padding:20px 28px;border-bottom:1px solid #f0e8e0;display:flex;align-items:center;justify-content:space-between;}
    .section-card-title{font-family:var(--font-display);font-size:1.2rem;color:var(--brown-dark);}
    .book-form{padding:28px;}
    .book-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .dt-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .cost-box{background:linear-gradient(135deg,var(--brown-dark),var(--brown-mid));border-radius:var(--radius-sm);padding:20px 24px;color:white;margin-top:16px;}
    .cost-box-label{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
    .cost-box-amount{font-family:var(--font-display);font-size:2rem;color:white;}
    .empty-res{padding:56px;text-align:center;}
    .cancel-btn{background:none;border:1px solid #e8ddd4;color:var(--text-muted);padding:6px 14px;border-radius:var(--radius-sm);font-size:0.75rem;cursor:pointer;transition:var(--transition);}
    .cancel-btn:hover{border-color:#c0392b;color:#c0392b;}
    .edit-btn{background:none;border:1px solid var(--gold);color:var(--gold);padding:6px 14px;border-radius:var(--radius-sm);font-size:0.75rem;cursor:pointer;transition:var(--transition);}
    .edit-btn:hover{background:var(--gold);color:var(--brown-dark);}
    .action-btns{display:flex;gap:6px;flex-wrap:wrap;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,5,2,0.72);z-index:1000;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:white;border-radius:var(--radius-md);padding:32px;width:100%;max-width:540px;margin:20px;position:relative;box-shadow:0 20px 60px rgba(10,5,2,0.4);}
    .modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.6rem;color:var(--text-muted);cursor:pointer;line-height:1;}
    .modal-title{font-family:var(--font-display);font-size:1.4rem;color:var(--brown-dark);margin-bottom:4px;}
    .modal-sub{font-size:0.82rem;color:var(--text-muted);margin-bottom:20px;}
    .edit-preview{background:linear-gradient(135deg,var(--brown-dark),var(--brown-mid));border-radius:var(--radius-sm);padding:16px 20px;margin-bottom:20px;display:none;}
  </style>
</head>
<body>
<div class="layout">
  <div id="sidebar-slot"></div>
  <div class="main-content">
    <div id="topbar-slot"></div>
    <div class="page-content">

      <div class="section-card">
        <div class="section-card-header">
          <div class="section-card-title">Book a Room</div>
          <a href="rooms.html" class="btn btn-outline btn-sm">Browse Rooms</a>
        </div>
        <div class="book-form">
          <div class="book-form-grid">
            <div class="form-group">
              <label>Select Room</label>
              <select class="form-control" id="select-room" onchange="updateCost()">
                <option value="">-- Choose a room --</option>
              </select>
            </div>
            <div></div>
            <div class="dt-row">
              <div class="form-group">
                <label>Check-in Date</label>
                <input type="date" class="form-control" id="checkin" onchange="updateCost()" />
              </div>
              <div class="form-group">
                <label>Check-in Time</label>
                <select class="form-control" id="checkin-time"></select>
              </div>
            </div>
            <div class="dt-row">
              <div class="form-group">
                <label>Check-out Date</label>
                <input type="date" class="form-control" id="checkout" onchange="updateCost()" />
              </div>
              <div class="form-group">
                <label>Check-out Time</label>
                <select class="form-control" id="checkout-time"></select>
              </div>
            </div>
          </div>
          <div class="cost-box" id="cost-box" style="display:none">
            <div class="cost-box-label">Estimated Total</div>
            <div class="cost-box-amount" id="cost-amount"></div>
            <div style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-top:4px" id="cost-detail"></div>
          </div>
          <div style="margin-top:20px;display:flex;gap:12px">
            <button class="btn btn-primary" onclick="makeReservation()">Confirm Reservation</button>
            <button class="btn btn-ghost" style="color:var(--text-muted);border-color:#e8ddd4" onclick="clearForm()">Clear</button>
          </div>
        </div>
      </div>

      <div class="section-card">
        <div class="section-card-header">
          <div class="section-card-title">My Reservations</div>
          <span id="res-count" class="badge badge-gold"></span>
        </div>
        <div id="reservations-list"></div>
      </div>

    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-res-modal" onclick="closeEditResModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeEditResModal()">×</button>
    <div class="modal-title">Edit Reservation</div>
    <div class="modal-sub" id="edit-res-sub"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="form-group">
        <label>Check-in Date</label>
        <input type="date" class="form-control" id="edit-ci" onchange="updateEditPreview()" />
      </div>
      <div class="form-group">
        <label>Check-in Time</label>
        <select class="form-control" id="edit-ci-time" onchange="updateEditPreview()"></select>
      </div>
      <div class="form-group">
        <label>Check-out Date</label>
        <input type="date" class="form-control" id="edit-co" onchange="updateEditPreview()" />
      </div>
      <div class="form-group">
        <label>Check-out Time</label>
        <select class="form-control" id="edit-co-time" onchange="updateEditPreview()"></select>
      </div>
    </div>
    <div class="edit-preview" id="edit-preview">
      <div style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px">Updated Total</div>
      <div id="edit-preview-amt" style="font-family:var(--font-display);font-size:1.8rem;color:white"></div>
      <div id="edit-preview-det" style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-top:2px"></div>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveEditRes()">Save Changes</button>
    <button class="btn btn-full" style="margin-top:8px;background:none;border:1.5px solid #e8ddd4;color:var(--text-muted)" onclick="closeEditResModal()">Cancel</button>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/nav.js"></script>
<script>
  const user = initPage('reservation','Reservation');
  let editingResId = null;

  buildTimePicker('checkin-time', 14);
  buildTimePicker('checkout-time',12);

  function populateRoomSelect() {
    const rooms = Store.getRooms().filter(r=>r.available);
    const sel = document.getElementById('select-room');
    sel.innerHTML = '<option value="">-- Choose a room --</option>';
    rooms.forEach(r => {
      sel.innerHTML += `<option value="${r.roomNumber}" data-price="${r.pricePerNight}">${r.type} Room #${r.roomNumber} — ${UI.formatCurrency(r.pricePerNight)}/night</option>`;
    });
    if(!rooms.length) sel.innerHTML='<option value="">No available rooms at this time</option>';
  }

  function updateCost() {
    const sel=document.getElementById('select-room');
    const ci=document.getElementById('checkin').value;
    const co=document.getElementById('checkout').value;
    const opt=sel.options[sel.selectedIndex];
    if(!opt||!opt.dataset.price||!ci||!co){document.getElementById('cost-box').style.display='none';return;}
    const nights=Math.ceil((new Date(co)-new Date(ci))/86400000);
    if(nights<=0){document.getElementById('cost-box').style.display='none';return;}
    const total=nights*parseFloat(opt.dataset.price);
    document.getElementById('cost-amount').textContent=UI.formatCurrency(total);
    document.getElementById('cost-detail').textContent=`${nights} night${nights>1?'s':''} × ${UI.formatCurrency(parseFloat(opt.dataset.price))}/night`;
    document.getElementById('cost-box').style.display='block';
  }

  function makeReservation() {
    const roomNumber=parseInt(document.getElementById('select-room').value);
    const ci=document.getElementById('checkin').value;
    const co=document.getElementById('checkout').value;
    const ciTime=document.getElementById('checkin-time').value;
    const coTime=document.getElementById('checkout-time').value;
    if(!roomNumber){UI.showToast('Please select a room.','error');return;}
    if(!ci||!co){UI.showToast('Please fill in all date fields.','error');return;}
    if(new Date(co)<=new Date(ci)){UI.showToast('Check-out must be after check-in.','error');return;}
    const nights=Math.ceil((new Date(co)-new Date(ci))/86400000);
    const result=Bookings.create(user,roomNumber,ci,co,nights,ciTime,coTime);
    if(result.success){UI.showToast('Reservation confirmed!','success');clearForm();populateRoomSelect();renderReservations();}
    else UI.showToast(result.message,'error');
  }

  function clearForm() {
    document.getElementById('select-room').value='';
    document.getElementById('checkin').value='';
    document.getElementById('checkout').value='';
    document.getElementById('cost-box').style.display='none';
    buildTimePicker('checkin-time',14);
    buildTimePicker('checkout-time',12);
  }

  function cancelReservation(id) {
    if(!confirm('Cancel this reservation? This cannot be undone.')) return;
    Bookings.cancel(id);
    UI.showToast('Reservation cancelled.','info');
    populateRoomSelect();renderReservations();
  }

  function openEditResModal(id) {
    const res=Bookings.getForUser(user.username).find(r=>r.reservationId===id);
    if(!res) return;
    editingResId=id;
    document.getElementById('edit-res-sub').textContent=`${res.roomType} Room #${res.roomNumber} — ${UI.formatCurrency(res.pricePerNight)}/night`;
    const today=new Date().toISOString().split('T')[0];
    const ciEl=document.getElementById('edit-ci');
    const coEl=document.getElementById('edit-co');
    ciEl.value=res.checkIn; coEl.value=res.checkOut;
    ciEl.min=today; coEl.min=today;
    buildTimePicker('edit-ci-time', parseInt((res.checkInTime||'14:00').split(':')[0]));
    buildTimePicker('edit-co-time', parseInt((res.checkOutTime||'12:00').split(':')[0]));
    document.getElementById('edit-ci-time').value=res.checkInTime||'14:00';
    document.getElementById('edit-co-time').value=res.checkOutTime||'12:00';
    document.getElementById('edit-preview').style.display='none';
    document.getElementById('edit-res-modal').classList.add('open');
    document.body.style.overflow='hidden';
    updateEditPreview();
  }

  function updateEditPreview() {
    const res=Bookings.getForUser(user.username).find(r=>r.reservationId===editingResId);
    if(!res) return;
    const ci=document.getElementById('edit-ci').value;
    const co=document.getElementById('edit-co').value;
    if(!ci||!co) return;
    const nights=Math.ceil((new Date(co)-new Date(ci))/86400000);
    if(nights<=0) return;
    const total=nights*res.pricePerNight;
    document.getElementById('edit-preview-amt').textContent=UI.formatCurrency(total);
    document.getElementById('edit-preview-det').textContent=`${nights} night${nights>1?'s':''} × ${UI.formatCurrency(res.pricePerNight)}/night`;
    document.getElementById('edit-preview').style.display='block';
  }

  function saveEditRes() {
    const ci=document.getElementById('edit-ci').value;
    const co=document.getElementById('edit-co').value;
    const ciTime=document.getElementById('edit-ci-time').value;
    const coTime=document.getElementById('edit-co-time').value;
    if(!ci||!co){UI.showToast('Please fill in both dates.','error');return;}
    if(new Date(co)<=new Date(ci)){UI.showToast('Check-out must be after check-in.','error');return;}
    const result=Bookings.modify(editingResId,ci,co,ciTime,coTime);
    if(result.success){closeEditResModal();UI.showToast('Reservation updated!','success');renderReservations();}
    else UI.showToast(result.message,'error');
  }

  function closeEditResModal(e) {
    if(!e||e.target.id==='edit-res-modal'){
      document.getElementById('edit-res-modal').classList.remove('open');
      document.body.style.overflow='';
      editingResId=null;
    }
  }

  function renderReservations() {
    const reservations=Bookings.getForUser(user.username);
    const list=document.getElementById('reservations-list');
    document.getElementById('res-count').textContent=reservations.length+' total';
    if(!reservations.length){
      list.innerHTML=`<div class="empty-res">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#d4c4b8" stroke-width="1.2" stroke-linecap="round" style="margin-bottom:10px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <div style="font-size:0.88rem;color:var(--text-muted)">No reservations yet. <a href="rooms.html" style="color:var(--gold)">Browse rooms</a> to get started.</div>
      </div>`;
      return;
    }
    const tomorrow=new Date(); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(0,0,0,0);
    const rows=reservations.slice().reverse().map(r=>{
      const canEdit=r.status==='CONFIRMED'&&new Date(r.checkIn+'T00:00:00')>tomorrow;
      return `<tr>
        <td><strong>#${r.reservationId}</strong>${r.lastModified?`<div style="font-size:0.7rem;color:var(--text-muted);margin-top:2px">Modified: ${new Date(r.lastModified).toLocaleDateString()}</div>`:''}</td>
        <td>${r.roomType} #${r.roomNumber}</td>
        <td>${UI.formatDate(r.checkIn)}<div style="font-size:0.75rem;color:var(--text-muted)">${formatTime(r.checkInTime||'14:00')}</div></td>
        <td>${UI.formatDate(r.checkOut)}<div style="font-size:0.75rem;color:var(--text-muted)">${formatTime(r.checkOutTime||'12:00')}</div></td>
        <td>${r.nights} night${r.nights>1?'s':''}</td>
        <td>${UI.formatCurrency(r.totalRoomCost)}</td>
        <td><span class="badge ${r.status==='CONFIRMED'?'badge-green':r.status==='CANCELLED'?'badge-red':'badge-gold'}">${r.status}</span></td>
        <td><div class="action-btns">
          ${canEdit?`<button class="edit-btn" onclick="openEditResModal(${r.reservationId})">Edit</button>`:''}
          ${r.status==='CONFIRMED'?`<button class="cancel-btn" onclick="cancelReservation(${r.reservationId})">Cancel</button>`:'—'}
        </div></td>
      </tr>`;
    }).join('');
    list.innerHTML=`<div style="overflow-x:auto"><table>
      <thead><tr><th>ID</th><th>Room</th><th>Check-in</th><th>Check-out</th><th>Nights</th><th>Cost</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  const today=new Date().toISOString().split('T')[0];
  document.getElementById('checkin').min=today;
  document.getElementById('checkout').min=today;
  populateRoomSelect();
  renderReservations();
</script>
</body>
</html>
