<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auberge de Grandeur — Welcome</title>
  <link rel="stylesheet" href="frontend/css/style.css" />
  <style>
    body { overflow: hidden; height: 100vh; }
    .auth-page { display: flex; height: 100vh; width: 100%; }

    .auth-left {
      flex: 1; position: relative; overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end; padding: 48px;
    }
    .auth-bg {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, var(--brown-dark) 0%, var(--brown-mid) 40%, var(--brown-rich) 100%);
      z-index: 0;
    }
    .arch-frames {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      display: flex; gap: 20px; z-index: 1;
      align-items: flex-end;
    }
    .arch {
      border-radius: 100px 100px 0 0;
      overflow: hidden;
      border: 1.5px solid rgba(201,168,76,0.3);
      position: relative;
      flex-shrink: 0;
    }
    .arch svg {
      display: block;
      width: 100%; height: 100%;
    }
    .arch-caption {
      position: absolute;
      bottom: 14px; left: 0; right: 0;
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.78rem;
      color: rgba(245,230,200,0.7);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .auth-left-content { position: relative; z-index: 2; }
    .hotel-name {
      font-family: var(--font-display); font-size: 3rem; font-weight: 300;
      color: var(--gold-light); letter-spacing: 0.04em; line-height: 1.1; margin-bottom: 12px;
    }
    .hotel-tagline {
      font-size: 0.82rem; color: rgba(245,230,200,0.55);
      letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px;
    }
    .contact-info {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: rgba(245,230,200,0.45); margin-bottom: 20px;
    }
    .social-section-label {
      font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(245,230,200,0.3); margin-bottom: 10px;
    }
    .social-links { display: flex; gap: 10px; }
    .social-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,0.3);
      background: rgba(201,168,76,0.07);
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition); cursor: pointer; text-decoration: none;
    }
    .social-btn:hover {
      background: var(--gold); border-color: var(--gold);
      transform: translateY(-2px); box-shadow: 0 4px 16px rgba(201,168,76,0.3);
    }
    .social-btn svg { width: 16px; height: 16px; transition: var(--transition); }
    .social-btn .stroke-icon { fill: none; stroke: var(--gold); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .social-btn:hover .stroke-icon { stroke: var(--brown-dark); }
    .social-btn .fill-icon { fill: var(--gold); stroke: none; }
    .social-btn:hover .fill-icon { fill: var(--brown-dark); }

    .auth-right {
      width: 460px; background: var(--off-white);
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .auth-panel {
      flex: 1; padding: 48px 44px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .logo-mark {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--brown-light));
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 1.2rem;
      color: var(--brown-dark); font-weight: 600; margin-bottom: 20px;
    }
    .auth-tabs {
      display: flex; margin-bottom: 32px; border-bottom: 2px solid #e8ddd4;
    }
    .auth-tab {
      flex: 1; padding: 12px; text-align: center;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: var(--transition); background: none;
    }
    .auth-tab.active { color: var(--brown-dark); border-bottom-color: var(--gold); }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-title {
      font-family: var(--font-display); font-size: 2rem; font-weight: 400;
      color: var(--brown-dark); margin-bottom: 4px;
    }
    .auth-subtitle { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .input-wrap { position: relative; }
    .input-wrap .form-control { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: var(--text-muted); display: flex; align-items: center; transition: var(--transition);
    }
    .pw-toggle:hover { color: var(--brown-dark); }
    .pw-toggle svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

    .form-control.input-error { border-color: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,0.1); }

    .divider-text { text-align: center; position: relative; margin: 18px 0; }
    .divider-text::before, .divider-text::after {
      content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #e8ddd4;
    }
    .divider-text::before { left: 0; }
    .divider-text::after  { right: 0; }
    .divider-text span { font-size: 0.72rem; color: var(--text-muted); background: var(--off-white); padding: 0 10px; }

    @media (max-width: 768px) {
      .auth-left { display: none; }
      .auth-right { width: 100%; }
      body { overflow: auto; }
    }
  </style>
</head>
<body>
<div class="auth-page">

  <!-- Left: Branding -->
  <div class="auth-left">
    <div class="auth-bg"></div>
    <div class="arch-frames">

      <!-- Arch 1: Luxury Rooms -->
      <div class="arch" style="width:148px;height:234px">
        <svg viewBox="0 0 148 234" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="roomBg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#2a1408"/>
              <stop offset="100%" stop-color="#1a0c05"/>
            </linearGradient>
            <linearGradient id="bedG" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#8b6a2a" stop-opacity="0.6"/>
            </linearGradient>
            <linearGradient id="wallG" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#3b1f0e" stop-opacity="0.8"/>
              <stop offset="100%" stop-color="#2a1408" stop-opacity="0.4"/>
            </linearGradient>
          </defs>
          <!-- Background -->

          <!-- Floor -->

          <!-- Back wall panel lines -->
          <rect x="10" y="30" width="128" height="130" fill="url(#wallG)" rx="2"/>
          <line x1="12" y1="50" x2="136" y2="50" stroke="rgba(201,168,76,0.15)" stroke-width="0.5"/>
          <line x1="12" y1="100" x2="136" y2="100" stroke="rgba(201,168,76,0.15)" stroke-width="0.5"/>
          <line x1="74" y1="30" x2="74" y2="160" stroke="rgba(201,168,76,0.1)" stroke-width="0.5"/>
          <!-- Window with light glow -->
          <rect x="42" y="38" width="64" height="52" fill="rgba(201,168,76,0.08)" rx="2"/>
          <rect x="42" y="38" width="64" height="52" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="1" rx="2"/>
          <line x1="74" y1="38" x2="74" y2="90" stroke="rgba(201,168,76,0.25)" stroke-width="0.8"/>
          <line x1="42" y1="64" x2="106" y2="64" stroke="rgba(201,168,76,0.25)" stroke-width="0.8"/>
          <!-- Curtains -->
          <path d="M42 38 Q36 64 42 90" stroke="rgba(201,168,76,0.35)" stroke-width="2.5" fill="rgba(60,30,10,0.5)"/>
          <path d="M106 38 Q112 64 106 90" stroke="rgba(201,168,76,0.35)" stroke-width="2.5" fill="rgba(60,30,10,0.5)"/>
          <!-- Bed frame -->
          <rect x="20" y="128" width="108" height="44" fill="#1e0e05" rx="3"/>
          <!-- Mattress -->
          <rect x="22" y="124" width="104" height="36" fill="#2d1508" rx="3"/>
          <!-- Bedsheet / duvet -->
          <rect x="24" y="132" width="100" height="26" fill="#3b1a08" rx="2"/>
          <rect x="24" y="132" width="100" height="8" fill="url(#bedG)" rx="2" opacity="0.6"/>
          <!-- Pillows -->
          <rect x="30" y="124" width="32" height="16" fill="rgba(201,168,76,0.25)" rx="4" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
          <rect x="68" y="124" width="32" height="16" fill="rgba(201,168,76,0.25)" rx="4" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
          <!-- Bed legs -->
          <rect x="22" y="168" width="6" height="10" fill="#130a03" rx="1"/>
          <rect x="120" y="168" width="6" height="10" fill="#130a03" rx="1"/>
          <!-- Bedside table left -->
          <rect x="4" y="144" width="16" height="26" fill="#1e0e05" rx="2"/>
          <circle cx="12" cy="152" r="3" fill="rgba(201,168,76,0.5)"/>
          <ellipse cx="12" cy="149" rx="5" ry="3" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
          <!-- Bedside table right -->
          <rect x="128" y="144" width="16" height="26" fill="#1e0e05" rx="2"/>
          <circle cx="136" cy="152" r="3" fill="rgba(201,168,76,0.5)"/>
          <ellipse cx="136" cy="149" rx="5" ry="3" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
          <!-- Rug -->
          <ellipse cx="74" cy="185" rx="46" ry="8" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.15)" stroke-width="0.8"/>
          <!-- Gold accent trim top -->
          <rect x="0" y="0" width="148" height="2" fill="rgba(201,168,76,0.3)"/>
          <!-- Caption bg -->
          <rect x="0" y="202" width="148" height="32" fill="rgba(10,5,2,0.6)"/>

        <div class="arch-caption">Luxury Rooms</div>
      </div>

      <!-- Arch 2: Grand Lobby (taller, center) -->
      <div class="arch" style="width:158px;height:276px;margin-bottom:0">
        <svg viewBox="0 0 158 276" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lobbyBg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#231008"/>
              <stop offset="100%" stop-color="#150806"/>
            </linearGradient>
            <radialGradient id="chandG" cx="50%" cy="30%" r="40%">
              <stop offset="0%" stop-color="rgba(201,168,76,0.4)"/>
              <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
            </radialGradient>
            <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#1e0e06"/>
              <stop offset="100%" stop-color="#0e0603"/>
            </linearGradient>
          </defs>
          <!-- Background -->
          <rect width="158" height="276" fill="url(#lobbyBg)"/>
          <!-- Marble floor perspective -->
          <path d="M0 200 L158 200 L158 276 L0 276Z" fill="url(#floorG)"/>
          <!-- Floor tile lines -->
          <line x1="0" y1="220" x2="158" y2="220" stroke="rgba(201,168,76,0.12)" stroke-width="0.5"/>
          <line x1="0" y1="240" x2="158" y2="240" stroke="rgba(201,168,76,0.12)" stroke-width="0.5"/>
          <line x1="0" y1="260" x2="158" y2="260" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
          <line x1="40" y1="200" x2="20" y2="276" stroke="rgba(201,168,76,0.1)" stroke-width="0.5"/>
          <line x1="79" y1="200" x2="79" y2="276" stroke="rgba(201,168,76,0.1)" stroke-width="0.5"/>
          <line x1="118" y1="200" x2="138" y2="276" stroke="rgba(201,168,76,0.1)" stroke-width="0.5"/>
          <!-- Back wall arch structure -->
          <path d="M29 200 L29 100 Q29 60 79 60 Q129 60 129 100 L129 200Z" fill="rgba(42,20,8,0.7)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
          <!-- Inner arch -->
          <path d="M42 200 L42 108 Q42 76 79 76 Q116 76 116 108 L116 200Z" fill="rgba(30,14,6,0.5)" stroke="rgba(201,168,76,0.15)" stroke-width="0.8"/>
          <!-- Chandelier glow -->
          <ellipse cx="79" cy="70" rx="30" ry="20" fill="url(#chandG)"/>
          <!-- Chandelier structure -->
          <line x1="79" y1="20" x2="79" y2="50" stroke="rgba(201,168,76,0.6)" stroke-width="1.2"/>
          <!-- Chandelier rings -->
          <ellipse cx="79" cy="54" rx="18" ry="5" fill="none" stroke="rgba(201,168,76,0.6)" stroke-width="1"/>
          <ellipse cx="79" cy="62" rx="14" ry="4" fill="none" stroke="rgba(201,168,76,0.5)" stroke-width="0.8"/>
          <!-- Chandelier drops -->
          <line x1="61" y1="54" x2="58" y2="64" stroke="rgba(201,168,76,0.5)" stroke-width="0.8"/>
          <line x1="68" y1="54" x2="66" y2="65" stroke="rgba(201,168,76,0.5)" stroke-width="0.8"/>
          <line x1="79" y1="54" x2="79" y2="66" stroke="rgba(201,168,76,0.5)" stroke-width="0.8"/>
          <line x1="90" y1="54" x2="92" y2="65" stroke="rgba(201,168,76,0.5)" stroke-width="0.8"/>
          <line x1="97" y1="54" x2="100" y2="64" stroke="rgba(201,168,76,0.5)" stroke-width="0.8"/>
          <!-- Drop crystals -->
          <circle cx="58" cy="66" r="1.5" fill="rgba(201,168,76,0.7)"/>
          <circle cx="66" cy="67" r="1.5" fill="rgba(201,168,76,0.7)"/>
          <circle cx="79" cy="68" r="2" fill="rgba(201,168,76,0.8)"/>
          <circle cx="92" cy="67" r="1.5" fill="rgba(201,168,76,0.7)"/>
          <circle cx="100" cy="66" r="1.5" fill="rgba(201,168,76,0.7)"/>
          <!-- Column left -->
          <rect x="14" y="100" width="14" height="100" fill="#1e0e06" stroke="rgba(201,168,76,0.2)" stroke-width="0.8" rx="2"/>
          <rect x="11" y="96" width="20" height="8" fill="#2a1408" rx="2"/>
          <rect x="11" y="196" width="20" height="6" fill="#2a1408" rx="2"/>
          <!-- Column right -->
          <rect x="130" y="100" width="14" height="100" fill="#1e0e06" stroke="rgba(201,168,76,0.2)" stroke-width="0.8" rx="2"/>
          <rect x="127" y="96" width="20" height="8" fill="#2a1408" rx="2"/>
          <rect x="127" y="196" width="20" height="6" fill="#2a1408" rx="2"/>
          <!-- Reception desk -->
          <rect x="44" y="168" width="70" height="32" fill="#1e0e06" rx="3" stroke="rgba(201,168,76,0.25)" stroke-width="0.8"/>
          <rect x="44" y="168" width="70" height="8" fill="rgba(201,168,76,0.18)" rx="3"/>
          <!-- Small lamp on desk -->
          <line x1="100" y1="168" x2="100" y2="155" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
          <ellipse cx="100" cy="153" rx="6" ry="3" fill="rgba(201,168,76,0.2)" stroke="rgba(201,168,76,0.4)" stroke-width="0.7"/>
          <!-- Wall sconces -->
          <circle cx="20" cy="140" r="4" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
          <line x1="20" y1="136" x2="20" y2="130" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
          <circle cx="138" cy="140" r="4" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
          <line x1="138" y1="136" x2="138" y2="130" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
          <!-- Ceiling molding -->
          <rect x="0" y="22" width="158" height="3" fill="rgba(201,168,76,0.2)" rx="1"/>

        <div class="arch-caption">Grand Lobby</div>

      <!-- Arch 3: Fine Dining -->

        <svg viewBox="0 0 148 234" xmlns="http://www.w3.org/2000/svg">
          <defs>

            </linearGradient>
            <radialGradient id="candleG" cx="50%" cy="40%" r="35%">

              <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
            </radialGradient>
          </defs>
          <!-- Background -->
          <rect width="148" height="234" fill="url(#diningBg)"/>
          <!-- Floor -->
          <rect x="0" y="172" width="148" height="62" fill="#0e0704"/>
          <!-- Floor lines -->

          <line x1="0" y1="210" x2="148" y2="210" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>

          <!-- Painting left -->
          <rect x="14" y="28" width="44" height="58" fill="rgba(50,22,8,0.8)" rx="1" stroke="rgba(201,168,76,0.25)" stroke-width="0.8"/>
          <rect x="18" y="32" width="36" height="50" fill="rgba(30,12,4,0.7)" rx="1"/>
          <!-- Abstract painting lines -->
          <path d="M22 55 Q36 40 50 55" stroke="rgba(201,168,76,0.3)" stroke-width="1" fill="none"/>
          <path d="M22 65 Q36 50 50 65" stroke="rgba(120,70,30,0.4)" stroke-width="0.8" fill="none"/>
          <ellipse cx="36" cy="48" rx="8" ry="6" fill="rgba(201,168,76,0.08)"/>
          <!-- Painting right -->
          <rect x="90" y="28" width="44" height="58" fill="rgba(50,22,8,0.8)" rx="1" stroke="rgba(201,168,76,0.25)" stroke-width="0.8"/>
          <rect x="94" y="32" width="36" height="50" fill="rgba(30,12,4,0.7)" rx="1"/>
          <path d="M98 55 Q112 40 126 55" stroke="rgba(201,168,76,0.3)" stroke-width="1" fill="none"/>
          <path d="M98 65 Q112 50 126 65" stroke="rgba(120,70,30,0.4)" stroke-width="0.8" fill="none"/>
          <ellipse cx="112" cy="48" rx="8" ry="6" fill="rgba(201,168,76,0.08)"/>
          <!-- Candle glow -->
          <ellipse cx="74" cy="104" rx="22" ry="16" fill="url(#candleG)"/>
          <!-- Table -->
          <ellipse cx="74" cy="148" rx="46" ry="12" fill="#1a0a04" stroke="rgba(201,168,76,0.25)" stroke-width="0.8"/>
          <ellipse cx="74" cy="145" rx="46" ry="10" fill="#240e06" stroke="rgba(201,168,76,0.2)" stroke-width="0.5"/>
          <!-- White tablecloth -->
          <ellipse cx="74" cy="144" rx="40" ry="8" fill="rgba(245,230,200,0.08)" stroke="rgba(245,230,200,0.15)" stroke-width="0.5"/>
          <!-- Table legs -->
          <line x1="50" y1="155" x2="44" y2="172" stroke="#1a0a04" stroke-width="3"/>
          <line x1="98" y1="155" x2="104" y2="172" stroke="#1a0a04" stroke-width="3"/>
          <line x1="74" y1="155" x2="74" y2="172" stroke="#1a0a04" stroke-width="2.5"/>
          <!-- Candle holder -->
          <rect x="70" y="126" width="8" height="18" fill="rgba(201,168,76,0.5)" rx="1"/>
          <rect x="68" y="140" width="12" height="4" fill="rgba(201,168,76,0.4)" rx="1"/>
          <!-- Candle wax -->
          <rect x="72" y="118" width="4" height="10" fill="rgba(245,230,200,0.7)" rx="1"/>
          <!-- Flame -->
          <path d="M74 118 Q76 112 74 108 Q72 112 74 118Z" fill="rgba(255,200,80,0.9)"/>
          <path d="M74 116 Q75 113 74 111 Q73 113 74 116Z" fill="rgba(255,240,180,1)"/>
          <!-- Plates on table -->
          <ellipse cx="56" cy="143" rx="10" ry="4" fill="rgba(245,230,200,0.08)" stroke="rgba(245,230,200,0.2)" stroke-width="0.5"/>
          <ellipse cx="92" cy="143" rx="10" ry="4" fill="rgba(245,230,200,0.08)" stroke="rgba(245,230,200,0.2)" stroke-width="0.5"/>
          <!-- Wine glasses -->
          <path d="M48 143 L48 134 Q44 130 52 130 Q56 130 52 134 L52 143" stroke="rgba(245,230,200,0.3)" stroke-width="0.8" fill="none"/>
          <line x1="50" y1="134" x2="50" y2="143" stroke="rgba(245,230,200,0.2)" stroke-width="0.5"/>
          <path d="M88 143 L88 134 Q84 130 92 130 Q96 130 92 134 L92 143" stroke="rgba(245,230,200,0.3)" stroke-width="0.8" fill="none"/>

  <!-- Right: Auth Forms -->
  <div class="auth-right">
    <div class="auth-panel">
      <div class="logo-mark">A</div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login -->
      <div class="auth-form active" id="form-login">
        <div class="auth-title">Welcome back</div>
        <div class="auth-subtitle">Sign in to manage your reservations</div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" class="form-control" id="login-username"
            placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" class="form-control" id="login-password"
              placeholder="Enter your password" autocomplete="current-password" />
            <button class="pw-toggle" type="button" onclick="togglePw('login-password', this)" tabindex="-1">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="btn btn-primary btn-full btn-lg mt-16" onclick="handleLogin()">Sign In</button>
        <div class="divider-text mt-16"><span>or</span></div>
        <button class="btn btn-outline btn-full" onclick="switchTab('register')">Create an Account</button>
      </div>

      <!-- Register -->
      <div class="auth-form" id="form-register">
        <div class="auth-title">Create account</div>
        <div class="auth-subtitle">Join Auberge de Grandeur today</div>

        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" class="form-control" id="reg-firstname" placeholder="First name" autocomplete="given-name"/>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" class="form-control" id="reg-lastname" placeholder="Last name" autocomplete="family-name"/>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" class="form-control" id="reg-phone" placeholder="09XXXXXXXXX"
            autocomplete="tel" oninput="validatePhoneHint(this)" maxlength="11"/>
          <small id="phone-hint" style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;display:block;">Format: 09XXXXXXXXX (11 digits)</small>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" class="form-control" id="reg-username" placeholder="Letters, numbers, underscore" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" class="form-control" id="reg-password" placeholder="Minimum 6 characters" autocomplete="new-password"/>
            <button class="pw-toggle" type="button" onclick="togglePw('reg-password', this)" tabindex="-1">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="btn btn-primary btn-full btn-lg mt-8" onclick="handleRegister()">Create Account</button>
        <div class="divider-text mt-16"><span>or</span></div>
        <button class="btn btn-outline btn-full" onclick="switchTab('login')">Already have an account? Sign In</button>
      </div>

    </div>
  </div>
</div>

<script src="frontend/js/app.js"></script>
<script>
  if (Store.getCurrentUser()) {
    window.location.href = 'frontend/pages/dashboard.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-register').classList.toggle('active', tab === 'register');
    document.querySelectorAll('.form-control').forEach(el => el.classList.remove('input-error'));
  }

  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.innerHTML = show
      ? `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }

  function handleLogin() {
    document.querySelectorAll('.form-control').forEach(el => el.classList.remove('input-error'));
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username) { document.getElementById('login-username').classList.add('input-error'); UI.showToast('Please enter your username.', 'error'); return; }
    if (!password) { document.getElementById('login-password').classList.add('input-error'); UI.showToast('Please enter your password.', 'error'); return; }

    // Check admin credentials first
    const adminMatch = Auth.isAdmin(username, password);
    if (adminMatch) {
      Auth.setAdminSession(adminMatch);
      UI.showToast(`Welcome, ${adminMatch.name}!`, 'success');
      setTimeout(() => { window.location.href = 'frontend/pages/admin.html'; }, 800);
      return;
    }

    const result = Auth.login(username, password);
    if (result.success) {
      UI.showToast(`Welcome back, ${result.user.firstName}!`, 'success');
      setTimeout(() => { window.location.href = 'frontend/pages/dashboard.html'; }, 800);
    } else {
      document.getElementById('login-username').classList.add('input-error');
      document.getElementById('login-password').classList.add('input-error');
      UI.showToast(result.message, 'error');
    }
  }

  function handleRegister() {
    document.querySelectorAll('.form-control').forEach(el => el.classList.remove('input-error'));
    const fields = {
      firstName: document.getElementById('reg-firstname'),
      lastName:  document.getElementById('reg-lastname'),
      email:     document.getElementById('reg-email'),
      phone:     document.getElementById('reg-phone'),
      username:  document.getElementById('reg-username'),
      password:  document.getElementById('reg-password'),
    };

    for (const [k, el] of Object.entries(fields)) {
      if (!el.value.trim()) {
        el.classList.add('input-error');
        el.focus();
        UI.showToast('Please fill in all fields.', 'error'); return;
      }
    }
    if (!fields.email.value.includes('@') || !fields.email.value.includes('.')) {
      fields.email.classList.add('input-error');
      UI.showToast('Please enter a valid email address.', 'error'); return;
    }
    if (fields.password.value.length < 6) {
      fields.password.classList.add('input-error');
      UI.showToast('Password must be at least 6 characters.', 'error'); return;
    }
    if (!/^[a-zA-Z0-9_]+$/.test(fields.username.value.trim())) {
      fields.username.classList.add('input-error');
      UI.showToast('Username: letters, numbers, and underscores only.', 'error'); return;
    }

    const data = {
      firstName: fields.firstName.value.trim(),
      lastName:  fields.lastName.value.trim(),
      email:     fields.email.value.trim(),
      contactNumber: fields.phone.value.trim(),
      username:  fields.username.value.trim(),
      password:  fields.password.value,
    };

    // Phone number validation
    if (!isValidPhone(data.contactNumber)) {
      fields.phone.classList.add('input-error');
      const hint = document.getElementById('phone-hint');
      if (hint) { hint.style.color = '#c0392b'; hint.textContent = 'Must be 09XXXXXXXXX — exactly 11 digits'; }
      UI.showToast('Phone number must start with 09 and be exactly 11 digits.', 'error'); return;
    }

    const result = Auth.register(data);
    if (result.success) {
      UI.showToast('Account created! Please sign in.', 'success');
      clearRegisterForm();
      setTimeout(() => switchTab('login'), 1000);
    } else {
      UI.showToast(result.message, 'error');
    }
  }

  function clearRegisterForm() {
    ['reg-firstname','reg-lastname','reg-email','reg-phone','reg-username','reg-password']
      .forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.value = ''; el.classList.remove('input-error'); }
      });
    const hint = document.getElementById('phone-hint');
    if (hint) { hint.style.color = 'var(--text-muted)'; hint.textContent = 'Format: 09XXXXXXXXX (11 digits)'; }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active = document.querySelector('.auth-form.active').id;
      if (active === 'form-login') handleLogin();
      else handleRegister();
    }
  });
</script>
</body>
</html>
